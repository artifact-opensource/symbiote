<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mach6</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-primary: #0f0f12;
  --bg-secondary: #1a1a22;
  --bg-tertiary: #252530;
  --bg-hover: #252530aa;
  --text-primary: #f0f0f5;
  --text-secondary: #9898a8;
  --text-tertiary: #606070;
  --accent: #8b5cf6;
  --accent-hover: #a78bfa;
  --accent-dim: #8b5cf620;
  --accent-glow: #8b5cf640;
  --accent-primary: #a855f7;
  --accent-soft: #c084fc;
  --accent-dim-alt: #a855f715;
  --accent-secondary: #d4a017;
  --accent-secondary-soft: #f0c040;
  --accent-secondary-dim: #d4a01715;
  --border: #1e1e28;
  --border-light: #2a2a38;
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #eab308;
  --orange: #f97316;
  --code-bg: #141418;
  --radius: 10px;
  --radius-lg: 14px;
  --sidebar-width: 280px;
  --font-mono: 'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
  --transition: 150ms ease;
}
html, body { height: 100%; }
body {
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  overflow: hidden;
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
.app { display: flex; height: 100vh; }

/* ── Sidebar ──────────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-width);
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  transition: transform 0.25s ease, opacity 0.25s ease;
  z-index: 100;
}
.sidebar.hidden { transform: translateX(-100%); position: absolute; height: 100%; opacity: 0; pointer-events: none; }
.sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.sidebar-header .logo { font-size: 20px; }
.sidebar-header .title { font-size: 14px; font-weight: 600; flex: 1; }
.new-chat-btn {
  background: var(--accent-primary);
  color: white;
  border: none;
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: background var(--transition);
}
.new-chat-btn:hover { background: var(--accent-soft); }

.session-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.session-list::-webkit-scrollbar { width: 4px; }
.session-list::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 4px; }

.session-item {
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: background var(--transition);
  margin-bottom: 2px;
}
.session-item:hover { background: var(--bg-tertiary); }
.session-item.active { background: var(--accent-dim-alt); border: 1px solid var(--accent-primary)40; }
.session-item .session-info { flex: 1; min-width: 0; }
.session-item .session-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.session-item .session-time { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }
.session-item .session-delete {
  opacity: 0;
  background: none;
  border: none;
  color: var(--text-tertiary);
  cursor: pointer;
  font-size: 14px;
  padding: 4px;
  border-radius: 4px;
  transition: opacity var(--transition), color var(--transition);
}
.session-item:hover .session-delete { opacity: 1; }
.session-item .session-delete:hover { color: var(--red); }

/* ── Sidebar Footer (Settings/Status) ─────────────────────── */
.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-tertiary);
}
.sidebar-footer .status-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}
.sidebar-footer .status-row:last-child { margin-bottom: 0; }
.sidebar-footer .label { color: var(--text-tertiary); min-width: 55px; }
.sidebar-footer .value { color: var(--text-secondary); font-family: var(--font-mono); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar-footer .dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  display: inline-block;
  flex-shrink: 0;
}
.sidebar-footer .dot.on { background: var(--green); box-shadow: 0 0 6px var(--green); }
.sidebar-footer .dot.off { background: var(--red); }
.sidebar-footer .dot.warn { background: var(--yellow); }

/* ── Main ─────────────────────────────────────────────────── */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.chat-header {
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 52px;
  background: var(--bg-primary);
}
.hamburger {
  background: none;
  border: none;
  color: var(--text-secondary);
  font-size: 20px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
  margin-right: 12px;
  transition: background var(--transition);
}
.hamburger:hover { background: var(--bg-tertiary); }
.chat-title {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.01em;
  display: flex;
  align-items: center;
  gap: 10px;
}
.chat-title .logo-icon {
  width: 28px; height: 28px;
  background: linear-gradient(135deg, var(--accent-primary), #7c3aed);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 800; color: white;
}
.chat-header-right { display: flex; align-items: center; gap: 12px; }
.model-badge {
  padding: 4px 12px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-light);
  border-radius: 8px;
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--text-secondary);
}

/* ── Messages ─────────────────────────────────────────────── */
.messages { flex: 1; overflow-y: auto; padding: 24px 0; }
.messages::-webkit-scrollbar { width: 5px; }
.messages::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 4px; }
.message { padding: 10px 24px; max-width: 100%; }
.message + .message { margin-top: 2px; }
.message-wrapper { max-width: 780px; margin: 0 auto; }
.message.user-msg .message-wrapper { border-left: 2px solid var(--accent-secondary-dim); padding-left: 12px; }
.message.assistant-msg .message-wrapper { border-left: 2px solid var(--accent-dim-alt); padding-left: 12px; }
.message-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.message-role { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
.message-role.user { color: var(--accent-secondary); }
.message-role.assistant { color: var(--accent-primary); }
.message-meta { font-size: 11px; color: var(--text-tertiary); margin-left: auto; display: flex; gap: 12px; }
.message-content { font-size: 14px; line-height: 1.75; color: var(--text-primary); }
.message-content p { margin-bottom: 10px; }
.message-content p:last-child { margin-bottom: 0; }
.message-content strong { font-weight: 600; }
.message-content em { font-style: italic; color: var(--text-secondary); }
.message-content code { font-family: var(--font-mono); font-size: 13px; background: var(--code-bg); padding: 2px 7px; border-radius: 5px; color: var(--orange); border: 1px solid var(--border); }
.message-content pre { background: var(--code-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; margin: 12px 0; overflow-x: auto; position: relative; }
.message-content pre code { background: none; padding: 0; color: var(--text-primary); font-size: 13px; line-height: 1.5; border: none; }
.code-lang { position: absolute; top: 8px; right: 12px; font-size: 10px; color: var(--text-tertiary); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.05em; }
.message-content blockquote { border-left: 3px solid var(--accent-primary); padding: 6px 16px; margin: 10px 0; color: var(--text-secondary); background: var(--accent-dim-alt); border-radius: 0 var(--radius) var(--radius) 0; }
.message-content ul, .message-content ol { padding-left: 22px; margin: 8px 0; }
.message-content li { margin: 4px 0; }
.message-content h1, .message-content h2, .message-content h3 { margin: 18px 0 8px; font-weight: 600; letter-spacing: -0.02em; }
.message-content h3 { font-size: 15px; }
.message-content hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
.message-content a { color: var(--accent-soft); text-decoration: none; }
.message-content a:hover { text-decoration: underline; }

/* ── Input ────────────────────────────────────────────────── */
.input-area { padding: 16px 24px 20px; border-top: 1px solid var(--border); background: var(--bg-primary); }
.input-wrapper { max-width: 780px; margin: 0 auto; position: relative; }
.chat-input {
  width: 100%; padding: 14px 52px 14px 18px; background: var(--bg-secondary);
  border: 1px solid var(--border-light); border-radius: var(--radius-lg); color: var(--text-primary);
  font-family: var(--font-sans); font-size: 14px; line-height: 1.5; resize: none; outline: none;
  transition: border-color var(--transition), box-shadow var(--transition); min-height: 48px; max-height: 200px;
}
.chat-input::placeholder { color: var(--text-tertiary); }
.chat-input:focus { border-color: var(--accent-primary); box-shadow: 0 0 0 3px var(--accent-dim-alt); }
.send-btn {
  position: absolute; right: 8px; bottom: 8px; width: 34px; height: 34px; border: none;
  background: var(--accent-secondary); color: var(--bg-primary); border-radius: 10px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 16px;
  transition: background var(--transition), transform var(--transition);
}
.send-btn:hover { background: var(--accent-secondary-soft); transform: scale(1.05); }
.send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

/* ── Status Bar ───────────────────────────────────────────── */
.status-bar {
  padding: 6px 24px; border-top: 1px solid var(--border); font-size: 11px;
  color: var(--text-tertiary); display: flex; align-items: center; gap: 16px; background: var(--bg-primary);
  justify-content: space-between;
}
.status-bar-left { display: flex; align-items: center; gap: 6px; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
.status-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }
.status-dot.disconnected { background: var(--red); }
.status-dot.reconnecting { background: var(--yellow); animation: pulse 1.5s infinite; }

/* ── Spinner / Animations ─────────────────────────────────── */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { width: 16px; height: 16px; border: 2px solid var(--bg-tertiary); border-top-color: var(--accent-primary); border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
.message { animation: fadeIn 250ms ease; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.streaming-indicator { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; background: var(--bg-secondary); border-radius: var(--radius); font-size: 12px; color: var(--text-secondary); border: 1px solid var(--border); }
.streaming-indicator .spinner { width: 12px; height: 12px; }

/* ── Empty State ──────────────────────────────────────────── */
.empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-tertiary); gap: 14px; }
.empty-state-icon { font-size: 56px; opacity: 0.2; }
.empty-state-text { font-size: 16px; font-weight: 500; color: var(--text-secondary); }
.empty-state-hint { font-size: 13px; }

/* ── Error Toast ──────────────────────────────────────────── */
.error-toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--red); color: white; padding: 10px 20px; border-radius: var(--radius); font-size: 13px; z-index: 1000; animation: fadeIn 200ms ease; max-width: 500px; }

/* ── Overlay (mobile sidebar) ─────────────────────────────── */
.overlay { display: none; position: fixed; inset: 0; background: #00000066; z-index: 99; }
.overlay.show { display: block; }

* { scrollbar-width: thin; scrollbar-color: var(--bg-tertiary) transparent; }

@media (max-width: 768px) {
  .sidebar { position: fixed; height: 100%; }
  .sidebar:not(.hidden) ~ .overlay { display: block; }
  .message { padding: 8px 16px; }
  .input-area { padding: 12px 16px 16px; }
  .chat-header { padding: 12px 16px; }
  .status-bar { padding: 6px 16px; }
}
</style>
</head>
<body>
<div class="app">
  <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="logo" id="sidebarLogo">🤖</span>
      <span class="title" id="sidebarTitle">Agent</span>
      <button class="new-chat-btn" onclick="newChat()">+ New</button>
    </div>
    <div class="session-list" id="sessionList"></div>
    <div class="sidebar-footer" id="sidebarFooter">
      <div class="status-row">
        <span class="dot off" id="footerDot"></span>
        <span class="value" id="footerStatus">Disconnected</span>
      </div>
      <div class="status-row">
        <span class="label">Model</span>
        <span class="value" id="footerModel">—</span>
      </div>
      <div class="status-row">
        <span class="label">Provider</span>
        <span class="value" id="footerProvider">—</span>
      </div>
      <div class="status-row">
        <span class="label">Uptime</span>
        <span class="value" id="footerUptime">—</span>
      </div>
      <div class="status-row">
        <span class="label">Tools</span>
        <span class="value" id="footerTools">—</span>
      </div>
    </div>
  </aside>

  <!-- Main Chat -->
  <main class="main">
    <div class="chat-header">
      <div style="display:flex;align-items:center;">
        <button class="hamburger" onclick="toggleSidebar()" title="Toggle sidebar">☰</button>
        <div class="chat-title">
          <div class="logo-icon" id="headerLogo">🤖</div>
          <span id="headerTitle">Mach6</span>
        </div>
      </div>
      <div class="chat-header-right">
        <button class="header-btn" onclick="window.open('/graph','_blank')" title="Knowledge Graph" style="background:none;border:none;color:var(--text-secondary);cursor:pointer;padding:6px;border-radius:6px;display:flex;align-items:center;transition:all 0.2s">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="6" cy="6" r="3"/><circle cx="18" cy="18" r="3"/><circle cx="18" cy="6" r="3"/><line x1="8.5" y1="7.5" x2="15.5" y2="16.5"/><line x1="15.5" y1="7.5" x2="8.5" y2="7.5"/></svg>
        </button>
        <span class="model-badge" id="modelBadge">connecting...</span>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">
        <div class="empty-state-icon" id="emptyIcon">🤖</div>
        <div class="empty-state-text" id="emptyText">Mach6</div>
        <div class="empty-state-hint">Type a message to begin</div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea class="chat-input" id="chatInput" placeholder="Type a message..." rows="1"
          onkeydown="handleInputKey(event)" oninput="autoResize(this)" disabled></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send" disabled>↑</button>
      </div>
    </div>

    <div class="status-bar" id="statusBar">
      <div class="status-bar-left">
        <span class="status-dot disconnected" id="statusDot"></span>
        <span id="statusText">Connecting...</span>
      </div>
      <span id="statusInfo">—</span>
    </div>
  </main>
</div>

<script>
// ── State ──────────────────────────────────────────────────────
const API_BASE = window.location.origin;
let connected = false;
let isBusy = false;
let retryDelay = 3000;
let retryTimer = null;
let retryCountdown = null;

// Agent identity (populated from /api/status)
let agentName = 'Agent';
let agentEmoji = '🤖';

// ── Session Management (localStorage) ──────────────────────────
const STORAGE_KEY = 'mach6-sessions';
const ACTIVE_KEY = 'mach6-active';

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

function loadSessions() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}
function saveSessions(sessions) { localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions)); }
function getActiveId() { return localStorage.getItem(ACTIVE_KEY); }
function setActiveId(id) { localStorage.setItem(ACTIVE_KEY, id); }

function getActiveSession() {
  const sessions = loadSessions();
  const id = getActiveId();
  return sessions.find(s => s.id === id) || null;
}

function updateActiveSession(messages) {
  const sessions = loadSessions();
  const id = getActiveId();
  const idx = sessions.findIndex(s => s.id === id);
  if (idx >= 0) {
    sessions[idx].messages = messages;
    sessions[idx].updatedAt = Date.now();
    if (messages.length > 0 && sessions[idx].title === 'New Chat') {
      const firstUser = messages.find(m => m.role === 'user');
      if (firstUser) sessions[idx].title = firstUser.content.slice(0, 40) + (firstUser.content.length > 40 ? '...' : '');
    }
    saveSessions(sessions);
    renderSessionList();
  }
}

function newChat() {
  const sessions = loadSessions();
  const s = { id: uid(), title: 'New Chat', messages: [], createdAt: Date.now(), updatedAt: Date.now() };
  sessions.unshift(s);
  saveSessions(sessions);
  setActiveId(s.id);
  currentMessages = [];
  renderMessages();
  renderSessionList();
  // Show empty state
  const el = document.getElementById('messages');
  el.innerHTML = '<div class="empty-state" id="emptyState"><div class="empty-state-icon">' + agentEmoji + '</div><div class="empty-state-text">' + agentName + ' — Mach6</div><div class="empty-state-hint">Type a message to begin</div></div>';
  closeSidebarMobile();
}

function switchSession(id) {
  setActiveId(id);
  const session = getActiveSession();
  currentMessages = session ? [...session.messages] : [];
  renderMessages();
  renderSessionList();
  closeSidebarMobile();
}

function deleteSession(id, ev) {
  ev.stopPropagation();
  let sessions = loadSessions();
  sessions = sessions.filter(s => s.id !== id);
  saveSessions(sessions);
  if (getActiveId() === id) {
    if (sessions.length > 0) {
      switchSession(sessions[0].id);
    } else {
      newChat();
    }
  }
  renderSessionList();
}

function renderSessionList() {
  const el = document.getElementById('sessionList');
  const sessions = loadSessions();
  const activeId = getActiveId();
  el.innerHTML = sessions.map(s => {
    const active = s.id === activeId ? ' active' : '';
    const time = formatTime(s.updatedAt);
    const msgCount = s.messages.length;
    return '<div class="session-item' + active + '" onclick="switchSession(\'' + s.id + '\')">'
      + '<div class="session-info">'
      + '<div class="session-title">' + esc(s.title) + '</div>'
      + '<div class="session-time">' + time + (msgCount > 0 ? ' · ' + msgCount + ' msgs' : '') + '</div>'
      + '</div>'
      + '<button class="session-delete" onclick="deleteSession(\'' + s.id + '\', event)" title="Delete">🗑</button>'
      + '</div>';
  }).join('');
}

function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  if (d.toDateString() === now.toDateString()) {
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

// ── Sidebar Toggle ─────────────────────────────────────────────
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('overlay');
  sb.classList.toggle('hidden');
  ov.classList.toggle('show', !sb.classList.contains('hidden'));
}
function closeSidebarMobile() {
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.add('hidden');
    document.getElementById('overlay').classList.remove('show');
  }
}

// ── Messages (in-memory for current session) ───────────────────
let currentMessages = [];

function addMessage(role, content, meta) {
  currentMessages.push({ role, content, meta: meta || null });
  updateActiveSession(currentMessages);
  renderMessages();
}

function renderMessages() {
  const el = document.getElementById('messages');
  const emptyState = document.getElementById('emptyState');
  if (emptyState && currentMessages.length > 0) emptyState.remove();
  if (currentMessages.length === 0) {
    el.innerHTML = '<div class="empty-state" id="emptyState"><div class="empty-state-icon">' + agentEmoji + '</div><div class="empty-state-text">' + agentName + ' — Mach6</div><div class="empty-state-hint">Type a message to begin</div></div>';
    return;
  }
  el.innerHTML = currentMessages.map(function(msg, i) {
    var metaHtml = msg.meta ? '<span class="message-meta">' + esc(msg.meta) + '</span>' : '';
    var msgClass = msg.role === 'user' ? 'user-msg' : 'assistant-msg';
    var roleLabel = msg.role === 'user' ? '👤' : agentEmoji;
    return '<div class="message ' + msgClass + '" data-idx="' + i + '"><div class="message-wrapper"><div class="message-header"><span class="message-role ' + msg.role + '">' + roleLabel + ' ' + (msg.role === 'user' ? 'You' : agentName) + '</span>' + metaHtml + '</div><div class="message-content">' + renderMarkdown(msg.content) + '</div></div></div>';
  }).join('');
  el.scrollTop = el.scrollHeight;
}

// ── Connection + Auto-Reconnect ────────────────────────────────
function setStatus(state, text) {
  var dot = document.getElementById('statusDot');
  var txt = document.getElementById('statusText');
  var fDot = document.getElementById('footerDot');
  var fStatus = document.getElementById('footerStatus');
  dot.className = 'status-dot ' + state;
  txt.textContent = text;
  fDot.className = 'dot ' + (state === 'connected' ? 'on' : state === 'reconnecting' ? 'warn' : 'off');
  fStatus.textContent = text;
}

function updateFooter(health) {
  // Update agent identity from server
  if (health.agentName) {
    agentName = health.agentName;
    agentEmoji = health.agentEmoji || '🤖';
    document.title = 'Mach6 — ' + agentName;
    document.getElementById('sidebarLogo').textContent = agentEmoji;
    document.getElementById('sidebarTitle').textContent = agentName;
    document.getElementById('headerLogo').textContent = agentEmoji;
    document.getElementById('headerTitle').textContent = agentName + ' — Mach6';
    var emptyIcon = document.getElementById('emptyIcon');
    var emptyText = document.getElementById('emptyText');
    if (emptyIcon) emptyIcon.textContent = agentEmoji;
    if (emptyText) emptyText.textContent = agentName + ' — Mach6';
    document.getElementById('chatInput').placeholder = 'Message ' + agentName + '...';
  }
  document.getElementById('footerModel').textContent = health.model || '—';
  document.getElementById('footerProvider').textContent = (health.provider || '—').replace('github-copilot/', '');
  var up = health.uptime;
  if (typeof up === 'number') {
    var h = Math.floor(up / 3600);
    var m = Math.floor((up % 3600) / 60);
    up = (h > 0 ? h + 'h ' : '') + m + 'm';
  }
  document.getElementById('footerUptime').textContent = up || '—';
  document.getElementById('footerTools').textContent = (health.tools || 0) + ' available';
  document.getElementById('modelBadge').textContent = health.model || 'connected';
  var channels = (health.channels || []);
  if (Array.isArray(channels)) {
    channels = channels.map(function(c) { return typeof c === 'string' ? c : c.id || ''; });
  }
  document.getElementById('statusInfo').textContent = (health.provider || '').replace('github-copilot/', '') + ' · ' + (health.tools || 0) + ' tools';
}

async function tryConnect() {
  try {
    var res = await fetch(API_BASE + '/api/status', { signal: AbortSignal.timeout(5000) });
    if (res.ok) {
      var health = await res.json();
      connected = true;
      retryDelay = 3000;
      clearTimeout(retryTimer);
      clearInterval(retryCountdown);
      setStatus('connected', 'Connected');
      updateFooter(health);
      document.getElementById('chatInput').disabled = false;
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('chatInput').focus();
      return true;
    }
  } catch (e) { /* ignore */ }
  return false;
}

function scheduleRetry() {
  connected = false;
  document.getElementById('chatInput').disabled = true;
  document.getElementById('sendBtn').disabled = true;
  var seconds = Math.ceil(retryDelay / 1000);
  setStatus('reconnecting', 'Reconnecting in ' + seconds + 's...');

  // Countdown display
  clearInterval(retryCountdown);
  retryCountdown = setInterval(function() {
    seconds--;
    if (seconds > 0) setStatus('reconnecting', 'Reconnecting in ' + seconds + 's...');
  }, 1000);

  clearTimeout(retryTimer);
  retryTimer = setTimeout(async function() {
    clearInterval(retryCountdown);
    setStatus('reconnecting', 'Connecting...');
    var ok = await tryConnect();
    if (!ok) {
      retryDelay = Math.min(retryDelay * 1.5, 30000);
      scheduleRetry();
    }
  }, retryDelay);
}

async function init() {
  // Initialize sessions
  var sessions = loadSessions();
  if (sessions.length === 0) {
    newChat();
  } else {
    var activeId = getActiveId();
    if (!sessions.find(function(s) { return s.id === activeId; })) {
      setActiveId(sessions[0].id);
    }
    var session = getActiveSession();
    currentMessages = session ? [...session.messages] : [];
    renderMessages();
    renderSessionList();
  }

  // On mobile, start with sidebar hidden
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.add('hidden');
  }

  // Try to connect
  var ok = await tryConnect();
  if (!ok) scheduleRetry();

  // Periodic health check every 30s when connected
  setInterval(async function() {
    if (connected) {
      var stillOk = await tryConnect();
      if (!stillOk) scheduleRetry();
    }
  }, 30000);
}

// ── Send Message ───────────────────────────────────────────────
async function sendMessage() {
  var input = document.getElementById('chatInput');
  var text = input.value.trim();
  if (!text || isBusy || !connected) return;

  input.value = '';
  autoResize(input);
  isBusy = true;
  document.getElementById('sendBtn').disabled = true;

  addMessage('user', text);

  var messagesEl = document.getElementById('messages');
  var thinkingEl = document.createElement('div');
  thinkingEl.className = 'message';
  thinkingEl.id = 'thinking';
  thinkingEl.innerHTML = '<div class="message-wrapper"><div class="message-header"><span class="message-role assistant">' + agentName + '</span></div><div class="streaming-indicator"><span class="spinner"></span> Thinking...</div></div>';
  messagesEl.appendChild(thinkingEl);
  messagesEl.scrollTop = messagesEl.scrollHeight;

  try {
    var startMs = Date.now();
    var res = await fetch(API_BASE + '/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId: getActiveId(), message: text })
    });

    var thinking = document.getElementById('thinking');
    if (thinking) thinking.remove();

    if (!res.ok) {
      var err = {};
      try { err = await res.json(); } catch(e) { err = { error: 'Unknown error' }; }
      showError(err.error || 'HTTP ' + res.status);
      isBusy = false;
      document.getElementById('sendBtn').disabled = false;
      return;
    }

    var reader = res.body.getReader();
    var decoder = new TextDecoder();
    var fullContent = '';
    var latency = '';
    var buffer = '';

    while (true) {
      var chunk = await reader.read();
      if (chunk.done) break;
      buffer += decoder.decode(chunk.value, { stream: true });
    }
    // Process remaining buffer too
    var allLines = buffer.split('\n');
    for (var i = 0; i < allLines.length; i++) {
      if (!allLines[i].startsWith('data: ')) continue;
      var dataStr = allLines[i].slice(6).trim();
      if (!dataStr) continue;
      try {
        var data = JSON.parse(dataStr);
        if (data.type === 'text') fullContent += data.content;
        else if (data.type === 'done' && data.message && data.message.latencyMs) {
          latency = (data.message.latencyMs / 1000).toFixed(1) + 's';
        }
      } catch(e) { console.log('SSE parse error:', e, dataStr); }
    }

    if (!latency) latency = ((Date.now() - startMs) / 1000).toFixed(1) + 's';
    addMessage('assistant', fullContent || '(no response)', latency);

  } catch (e) {
    var thinking2 = document.getElementById('thinking');
    if (thinking2) thinking2.remove();
    showError('Request failed: ' + e.message);
    // Connection might be lost
    if (!navigator.onLine || e.message.includes('fetch')) {
      connected = false;
      scheduleRetry();
    }
  }

  isBusy = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('chatInput').focus();
}

function handleInputKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 200) + 'px'; }

function showError(msg) {
  var existing = document.querySelector('.error-toast');
  if (existing) existing.remove();
  var el = document.createElement('div');
  el.className = 'error-toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(function() { el.remove(); }, 5000);
}

// ── Markdown Renderer ──────────────────────────────────────────
function renderMarkdown(text) {
  if (!text) return '';
  var t = esc(text);
  t = t.replace(/```(\w*)\n([\s\S]*?)```/g, function(_, lang, code) {
    return '<pre><code>' + code.trim() + '</code>' + (lang ? '<span class="code-lang">' + lang + '</span>' : '') + '</pre>';
  });
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  t = t.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  t = t.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  t = t.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  t = t.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*(.+?)\*/g, '<em>$1</em>');
  t = t.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  t = t.replace(/^---$/gm, '<hr>');
  t = t.replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>');
  t = t.replace(/^- (.+)$/gm, '<li>$1</li>');
  t = t.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
  t = t.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  t = t.replace(/\n\n/g, '</p><p>');
  t = '<p>' + t + '</p>';
  t = t.replace(/<p>\s*<\/p>/g, '');
  t = t.replace(/<p>(<h[123]>)/g, '$1');
  t = t.replace(/(<\/h[123]>)<\/p>/g, '$1');
  t = t.replace(/<p>(<pre>)/g, '$1');
  t = t.replace(/(<\/pre>)<\/p>/g, '$1');
  t = t.replace(/<p>(<ul>)/g, '$1');
  t = t.replace(/(<\/ul>)<\/p>/g, '$1');
  t = t.replace(/<p>(<blockquote>)/g, '$1');
  t = t.replace(/(<\/blockquote>)<\/p>/g, '$1');
  t = t.replace(/<p>(<hr>)/g, '$1');
  t = t.replace(/\n/g, '<br>');
  return t;
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── Boot ───────────────────────────────────────────────────────
init();
</script>
